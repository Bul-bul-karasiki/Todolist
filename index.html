<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Todo List</title>
    <link rel="icon" href="https://blog.lulu.com/content/images/2024/12/072120-ToDoList-Blog.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="liquid-glass theme-default">

    <div id="connectedIndicator" class="toast-indicator"></div>
    <div id="copiedIndicator" class="toast-indicator"></div>
    <div id="disconnectedIndicator" class="toast-indicator"></div>
    <div id="limitIndicator" class="toast-indicator"></div>
    <div id="actionIndicator" class="toast-indicator"></div>
    <div id="pinIndicator" class="toast-indicator"></div> <div class="settings-menu-container">
        <button class="settings-btn glass-btn" id="settingsBtn" data-tooltip-bottom="Settings">
            <i class="ph ph-gear"></i>
        </button>
        <div class="settings-dropdown glass-panel" id="settingsDropdown">
            <button class="language-btn glass-btn" id="langBtn" data-tooltip=""></button>
            <button class="language-btn glass-btn" id="themeBtn" data-tooltip=""></button>
            
            <button class="language-btn glass-btn" id="shareMenuBtn" data-tooltip="">
                <div style="display:flex; align-items:center; gap:10px;"><i class="ph ph-broadcast"></i> <span id="shareBtnMenuText">Shared access</span></div>
                <i class="ph ph-caret-right" style="margin-left: auto;"></i>
            </button>
            
            <button class="language-btn glass-btn" id="darkModeBtn" data-tooltip="">
                <div style="display:flex; align-items:center; gap:10px;"><i class="ph ph-moon"></i> <span id="darkModeLabel">Dark mode</span></div>
                <label class="toggle-switch" style="margin-left:auto; pointer-events:none;">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider"></span>
                </label>
            </button>
            <button class="language-btn glass-btn" id="liquidGlassBtn" data-tooltip="">
                <div style="display:flex; align-items:center; gap:10px;"><i class="ph ph-drop"></i> <span id="liquidGlassLabel">Liquid glass</span></div>
                <label class="toggle-switch" style="margin-left:auto; pointer-events:none;">
                    <input type="checkbox" id="liquidGlassToggle">
                    <span class="slider"></span>
                </label>
            </button>
            <button class="language-btn glass-btn" id="staticBgBtn" style="display: flex;" data-tooltip="">
                <div style="display:flex; align-items:center; gap:10px;"><i class="ph ph-image"></i> <span id="staticBgLabel">Static background</span></div>
                <label class="toggle-switch" style="margin-left:auto; pointer-events:none;">
                    <input type="checkbox" id="staticBgToggle">
                    <span class="slider"></span>
                </label>
            </button>
        </div>

        <div class="solid-dropdown glass-panel" id="languageDropdown">
            <div class="language-search-container">
                <input type="text" class="language-search glass-input" id="langSearch" placeholder="Search...">
            </div>
            <div class="language-list" id="langList">
                <button data-lang="ar">🇸🇦 العربية</button>
                <button data-lang="bg">🇧🇬 Български</button>
                <button data-lang="de">🇩🇪 Deutsch</button>
                <button data-lang="en" class="selected">🇬🇧 English</button>
                <button data-lang="es">🇪🇸 Español</button>
                <button data-lang="fr">🇫🇷 Français</button>
                <button data-lang="it">🇮🇹 Italiano</button>
                <button data-lang="nl">🇳🇱 Nederlands</button>
                <button data-lang="pl">🇵🇱 Polski</button>
                <button data-lang="pt">🇵🇹 Português</button>
                <button data-lang="ru">🇷🇺 Русский</button>
                <button data-lang="sv">🇸🇪 Svenska</button>
                <button data-lang="tr">🇹🇷 Türkçe</button>
                <button data-lang="uk">🇺🇦 Українська</button>
                <button data-lang="hi">🇮🇳 हिन्दी</button>
                <button data-lang="ja">🇯🇵 日本語</button>
                <button data-lang="zh">🇨🇳 中文</button>
                <button data-lang="ko">🇰🇷 한국어</button>
            </div>
        </div>

        <div class="solid-dropdown glass-panel" id="themeDropdown">
            <div class="theme-list" id="themeList"></div>
        </div>

        <div class="solid-dropdown glass-panel" id="shareDropdown" style="padding: 20px; min-width: 280px;">
            <h3 style="margin-top: 0; margin-bottom: 20px; font-weight: 600; text-align: center; font-size: 16px;">
                <i class="ph ph-broadcast"></i> <span id="shareModalTitle">Shared access</span>
            </h3>
            <div class="peer-section">
                <div class="id-container">
                    <label id="yourIdLabel">Your ID:</label>
                    <div class="id-display glass-input">
                        <span id="myPeerId">Loading...</span>
                        <button id="copyIdBtn" class="glass-btn icon-btn-text" data-tooltip="Copy ID">
                            <i class="ph ph-copy"></i>
                        </button>
                    </div>
                </div>
                <div class="connect-container" style="margin-top: 15px;">
                    <label id="connectFriendLabel">Connect to friend:</label>
                    <div class="connect-inputs">
                        <input type="text" id="friendIdInput" class="glass-input" placeholder="Enter friend's ID">
                        <div class="connection-buttons">
                            <button id="connectBtn" class="glass-btn connect-btn" data-tooltip="Connect"><i class="ph ph-link"></i></button>
                            <button id="disconnectBtn" class="glass-btn disconnect-btn" data-tooltip="Disconnect" disabled><i class="ph ph-plugs"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <h1 class="main-title" id="mainAppTitle">Todo list</h1>
        
        <div class="layout-wrapper">
            <div class="chat-sidebar" id="chatSidebar"></div>
            
            <div class="wrapper glass-panel">
                <input type="text" id="chatTitle" value="Chat 1" spellcheck="false" data-tooltip="">
                
                <div class="inner-chat-bg">
                    <div class="top-action-panel">
                        <div class="chat-input-wrapper glass-input">
                            <div id="imagePreviews" class="image-previews"></div>
                            <div class="input-row">
                                <button id="photoAttachBtn" class="icon-btn attach-clip" data-tooltip="">
                                    <i class="ph ph-paperclip"></i>
                                </button>
                                <textarea id="text" placeholder="Write a message..." rows="1"></textarea>
                                <button id="btn" class="send-btn glass-btn" data-tooltip="">
                                    <i class="ph ph-paper-plane-right"></i>
                                </button>
                            </div>
                        </div>
                        <input type="file" id="imageInput" multiple accept="image/*" style="display: none;">
                    </div>

                    <ul id="todolist"></ul>
                </div>
            </div>
        </div>
    </div>

    <div class="image-modal" id="imageModal">
        <button class="modal-close glass-btn" id="closeModalBtn" data-tooltip="Close"><i class="ph ph-x"></i></button>
        <img id="modalImg" src="" alt="Full screen image">
    </div>

    <script src="script.js"></script>
</body>
</html>
